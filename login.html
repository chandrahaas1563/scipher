<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/app.css">
    <link rel="stylesheet" href="./css/main-page.css">
    <title>Login - Scipher</title>
</head>
<body>

<script src="./js/api.js"></script>

<script>
    (function() {
        var user = localStorage.getItem('scipher_user');
        if (user) window.location.replace('./index.html');
    })();
</script>

<main class="main main-bg">
    <div class="main-bg__lights">
        <div class="main-bg__light main-bg__light-1"></div>
        <div class="main-bg__light main-bg__light-2"></div>
        <div class="main-bg__light main-bg__light-3"></div>
        <div class="main-bg__light main-bg__light-4"></div>
    </div>
    <div class="dots-top"></div>
    <div class="dots-bottom">
        <img src="./assets/images/bg-dots-bottom.png" alt="">
    </div>

    <!-- Logo -->
    <div class="center__logo-container">
        <h6>Welcome to</h6>
        <div class="center__logo-image">
            <img src="./assets/images/logo.png" alt="Scipher Logo" class="center__logo-img">
        </div>
    </div>

    <!-- Auth Card -->
    <div class="auth-wrapper">
        <div class="card auth-card">

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
                <button class="auth-tab" id="tab-register" onclick="showTab('register')">Create Account</button>
            </div>

            <!-- ── SIGN IN FORM ── -->
            <div id="form-login" class="card-body">
                <p id="login-error" class="auth-error" style="display:none;"></p>
                <div class="form-row">
                    <label for="login-username">Username or Email</label>
                    <input type="text" id="login-username" class="form-row-input" placeholder="Enter username or email" autocomplete="username">
                </div>
                <div class="form-row">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-row-input" placeholder="Enter password" autocomplete="current-password">
                </div>
                <div class="form-button" style="margin-top:20px;">
                    <button type="button" class="btn form-button-btn" id="login-btn" onclick="handleLogin()">
                        Sign In
                    </button>
                </div>

                <!-- Guest section — shown inline below Sign In button -->
                <div id="guest-normal" style="text-align:center; margin-top:14px;">
                    <a href="javascript:void(0)" onclick="showGuestInput()" style="color:rgba(255,255,255,0.45); font-size:0.85rem; text-decoration:none;">
                        Continue as Guest
                    </a>
                </div>

                <!-- Guest name input — hidden until "Continue as Guest" clicked -->
                <div id="guest-input-section" style="display:none; margin-top:14px;">
                    <p id="guest-error" class="auth-error" style="display:none;"></p>
                    <div class="form-row" style="margin-bottom:10px;">
                        <label for="guest-name" style="font-size:0.85rem; color:rgba(255,255,255,0.6);">Enter a guest name</label>
                        <input type="text" id="guest-name" class="form-row-input" placeholder="Guest display name" maxlength="20" autocomplete="off">
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button type="button" class="btn form-button-btn" onclick="handleGuest()" style="flex:1;">
                            Join as Guest
                        </button>
                        <button type="button" onclick="hideGuestInput()" style="background:transparent; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.5); border-radius:6px; padding:8px 14px; cursor:pointer; font-size:0.85rem;">
                            Cancel
                        </button>
                    </div>
                </div>
            </div>

            <!-- ── CREATE ACCOUNT FORM ── -->
            <div id="form-register" class="card-body" style="display:none;">
                <p id="register-error" class="auth-error" style="display:none;"></p>
                <p id="register-success" class="auth-success" style="display:none;"></p>
                <div class="form-row">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" class="form-row-input" placeholder="Choose a username" autocomplete="username">
                </div>
                <div class="form-row">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" class="form-row-input" placeholder="Enter your email" autocomplete="email">
                </div>
                <div class="form-row">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-row-input" placeholder="Min 6 characters" autocomplete="new-password">
                </div>
                <div class="form-button" style="margin-top:20px;">
                    <button type="button" class="btn form-button-btn" id="register-btn" onclick="handleRegister()">
                        Create Account
                    </button>
                </div>
            </div>

        </div>
    </div>
</main>

<style>
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        margin-top: 16px;
    }
    .auth-card { width: 100%; max-width: 420px; }
    .auth-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .auth-tab {
        flex: 1;
        padding: 14px;
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.45);
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .auth-tab.active {
        color: #fff;
        border-bottom: 2px solid var(--color-cyan, #00e5ff);
    }
    .auth-error {
        color: #ff4d4d;
        font-size: 0.85rem;
        margin-bottom: 12px;
        padding: 8px 12px;
        background: rgba(255,77,77,0.1);
        border-radius: 6px;
    }
    .auth-success {
        color: #4dff91;
        font-size: 0.85rem;
        margin-bottom: 12px;
        padding: 8px 12px;
        background: rgba(77,255,145,0.1);
        border-radius: 6px;
    }
    .form-row { margin-bottom: 16px; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .card-body { padding: 24px; }
</style>

<script>
    function showTab(tab) {
        document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
        document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        // Reset guest section when switching tabs
        hideGuestInput();
    }

    function showGuestInput() {
        document.getElementById('guest-normal').style.display = 'none';
        document.getElementById('guest-input-section').style.display = 'block';
        document.getElementById('guest-name').focus();
    }

    function hideGuestInput() {
        document.getElementById('guest-normal').style.display = 'block';
        document.getElementById('guest-input-section').style.display = 'none';
        document.getElementById('guest-name').value = '';
        document.getElementById('guest-error').style.display = 'none';
    }

    // Enter key
    document.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        var guestOpen = document.getElementById('guest-input-section').style.display !== 'none';
        var loginVisible = document.getElementById('form-login').style.display !== 'none';
        if (guestOpen) handleGuest();
        else if (loginVisible) handleLogin();
        else handleRegister();
    });

    // ── Sign In ──────────────────────────────────────────────
    async function handleLogin() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        const errorEl = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');

        errorEl.style.display = 'none';
        if (!username || !password) {
            errorEl.textContent = 'Please enter your username and password.';
            errorEl.style.display = 'block';
            return;
        }
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        try {
            const data = await SipherAPI.login(username, password);
            if (data.error) {
                errorEl.textContent = data.error;
                errorEl.style.display = 'block';
            } else {
                SipherAPI.saveSession(data.token, data.user);
                window.location.href = './index.html';
            }
        } catch (err) {
            errorEl.textContent = 'Could not connect to server. Please try again.';
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    // ── Create Account ───────────────────────────────────────
    async function handleRegister() {
        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value.trim();
        const errorEl = document.getElementById('register-error');
        const successEl = document.getElementById('register-success');
        const btn = document.getElementById('register-btn');

        errorEl.style.display = 'none';
        successEl.style.display = 'none';
        if (!username || !email || !password) {
            errorEl.textContent = 'All fields are required.';
            errorEl.style.display = 'block';
            return;
        }
        if (password.length < 6) {
            errorEl.textContent = 'Password must be at least 6 characters.';
            errorEl.style.display = 'block';
            return;
        }
        btn.disabled = true;
        btn.textContent = 'Creating account...';
        try {
            const data = await SipherAPI.register(username, email, password);
            if (data.error) {
                errorEl.textContent = data.error;
                errorEl.style.display = 'block';
            } else {
                SipherAPI.saveSession(data.token, data.user);
                window.location.href = './index.html';
            }
        } catch (err) {
            errorEl.textContent = 'Could not connect to server. Please try again.';
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    }

    // ── Guest ────────────────────────────────────────────────
    function handleGuest() {
        const name = document.getElementById('guest-name').value.trim();
        const errorEl = document.getElementById('guest-error');

        errorEl.style.display = 'none';
        if (!name) {
            errorEl.textContent = 'Please enter a display name.';
            errorEl.style.display = 'block';
            document.getElementById('guest-name').focus();
            return;
        }
        if (name.length < 2) {
            errorEl.textContent = 'Name must be at least 2 characters.';
            errorEl.style.display = 'block';
            return;
        }

        localStorage.setItem('scipher_user', JSON.stringify({
            username: name,
            isGuest: true,
            trophy_count: 0
        }));
        window.location.href = './index.html';
    }
</script>

</body>
</html>
