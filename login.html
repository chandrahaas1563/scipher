<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/app.css">
    <link rel="stylesheet" href="./css/main-page.css">
    <title>Login - Scipher</title>
</head>
<body>

<!-- ✅ If already logged in, skip to main page -->
<script>
    (function() {
        if (localStorage.getItem('scipher_user')) {
            window.location.replace('./index.html');
        }
    })();
</script>

<main class="main main-bg">
    <!-- Lights and Background Images -->
    <div class="main-bg__lights">
        <div class="main-bg__light main-bg__light-1"></div>
        <div class="main-bg__light main-bg__light-2"></div>
        <div class="main-bg__light main-bg__light-3"></div>
        <div class="main-bg__light main-bg__light-4"></div>
    </div>

    <div class="dots-top"></div>
    <div class="dots-bottom">
        <img src="./assets/images/bg-dots-bottom.png" alt="">
    </div>

    <!-- ====== Logo ====== -->
    <div class="center__logo-container">
        <h6>Welcome to</h6>
        <div class="center__logo-image">
            <img src="./assets/images/logo.png" alt="Scipher Logo" class="center__logo-img">
        </div>
    </div>

    <!-- ====== Login Card ====== -->
    <div class="auth-wrapper">
        <div class="card auth-card">
            <div class="card-header">
                <div class="card-header-heading">
                    <img src="./assets/images/profile-icon.svg" alt="user icon">
                    <h6 class="card-title">Sign In</h6>
                </div>
            </div>
            <div class="card-body">
                <!-- Error message -->
                <p id="login-error" style="color:#ff4d4d; font-size:0.85rem; margin-bottom:10px; display:none;">
                    Please enter a username and password.
                </p>

                <div class="form-row">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" class="form-row-input" placeholder="Enter your username" autocomplete="username">
                </div>

                <div class="form-row">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-row-input" placeholder="Enter your password" autocomplete="current-password">
                </div>

                <div class="form-button" style="margin-top: 20px;">
                    <button type="button" class="btn form-button-btn" id="login-btn" onclick="handleLogin()">
                        Sign In
                    </button>
                </div>

                <div style="text-align:center; margin-top: 16px;">
                    <a href="./create-account.html" style="color: var(--color-cyan, #00e5ff); font-size: 0.9rem; text-decoration: none;">
                        Don't have an account? Create one
                    </a>
                </div>

                <div style="text-align:center; margin-top: 10px;">
                    <a href="./guest-room.html" style="color: rgba(255,255,255,0.5); font-size: 0.85rem; text-decoration: none;">
                        Continue as Guest
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<style>
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        margin-top: 20px;
    }

    .auth-card {
        width: 100%;
        max-width: 420px;
    }

    .auth-card .card-body {
        padding: 24px;
    }

    .auth-card .form-row {
        margin-bottom: 16px;
    }
</style>

<!-- ✅ LOGIN LOGIC -->
<script>
    // Allow pressing Enter to submit
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });

    function handleLogin() {
        var username = document.getElementById('login-username').value.trim();
        var password = document.getElementById('login-password').value.trim();
        var errorEl = document.getElementById('login-error');

        // Basic validation — both fields required
        if (!username || !password) {
            errorEl.style.display = 'block';
            errorEl.textContent = 'Please enter a username and password.';
            return;
        }

        // Hide error
        errorEl.style.display = 'none';

        // Save user session to localStorage
        localStorage.setItem('scipher_user', JSON.stringify({
            username: username
        }));

        // Redirect to main page
        window.location.href = './index.html';
    }
</script>

</body>
</html>
