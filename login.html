<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/app.css">
    <link rel="stylesheet" href="./css/main-page.css">
    <title>Login - Scipher</title>
</head>
<body>

<script src="./js/api.js"></script>

<!-- If already logged in, skip to main page -->
<script>
    (function() {
        if (localStorage.getItem('scipher_user')) {
            window.location.replace('./index.html');
        }
    })();
</script>

<main class="main main-bg">
    <div class="main-bg__lights">
        <div class="main-bg__light main-bg__light-1"></div>
        <div class="main-bg__light main-bg__light-2"></div>
        <div class="main-bg__light main-bg__light-3"></div>
        <div class="main-bg__light main-bg__light-4"></div>
    </div>
    <div class="dots-top"></div>
    <div class="dots-bottom">
        <img src="./assets/images/bg-dots-bottom.png" alt="">
    </div>

    <!-- Logo -->
    <div class="center__logo-container">
        <h6>Welcome to</h6>
        <div class="center__logo-image">
            <img src="./assets/images/logo.png" alt="Scipher Logo" class="center__logo-img">
        </div>
    </div>

    <!-- Auth Card -->
    <div class="auth-wrapper">
        <div class="card auth-card">

            <!-- Tabs: Sign In | Create Account | Guest -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
                <button class="auth-tab" id="tab-register" onclick="showTab('register')">Create Account</button>
                <button class="auth-tab" id="tab-guest" onclick="showTab('guest')">Guest</button>
            </div>

            <!-- ── SIGN IN FORM ── -->
            <div id="form-login" class="card-body">
                <p id="login-error" class="auth-error" style="display:none;"></p>
                <div class="form-row">
                    <label for="login-username">Username or Email</label>
                    <input type="text" id="login-username" class="form-row-input" placeholder="Enter username or email" autocomplete="username">
                </div>
                <div class="form-row">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-row-input" placeholder="Enter password" autocomplete="current-password">
                </div>
                <div class="form-button" style="margin-top:20px;">
                    <button type="button" class="btn form-button-btn" id="login-btn" onclick="handleLogin()">
                        Sign In
                    </button>
                </div>
            </div>

            <!-- ── CREATE ACCOUNT FORM ── -->
            <div id="form-register" class="card-body" style="display:none;">
                <p id="register-error" class="auth-error" style="display:none;"></p>
                <div class="form-row">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" class="form-row-input" placeholder="Choose a username" autocomplete="username">
                </div>
                <div class="form-row">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" class="form-row-input" placeholder="Enter your email" autocomplete="email">
                </div>
                <div class="form-row">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-row-input" placeholder="Min 6 characters" autocomplete="new-password">
                </div>
                <div class="form-button" style="margin-top:20px;">
                    <button type="button" class="btn form-button-btn" id="register-btn" onclick="handleRegister()">
                        Create Account
                    </button>
                </div>
            </div>

            <!-- ── GUEST FORM ── -->
            <div id="form-guest" class="card-body" style="display:none;">
                <p id="guest-error" class="auth-error" style="display:none;"></p>
                <p style="color:rgba(255,255,255,0.45); font-size:0.82rem; margin-bottom:16px;">
                    Play without an account. Guest progress is not saved.
                </p>
                <div class="form-row">
                    <label for="guest-name">Display Name</label>
                    <input type="text" id="guest-name" class="form-row-input" placeholder="Enter a guest name" maxlength="20" autocomplete="off">
                </div>
                <div class="form-button" style="margin-top:20px;">
                    <button type="button" class="btn form-button-btn" id="guest-btn" onclick="handleGuest()">
                        Continue as Guest
                    </button>
                </div>
                <div style="text-align:center; margin-top:14px;">
                    <a href="javascript:void(0)" onclick="showTab('register')" style="color:rgba(0,229,255,0.7); font-size:0.82rem; text-decoration:none;">
                        Want to save your progress? Create an account →
                    </a>
                </div>
            </div>

        </div>
    </div>
</main>

<style>
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        margin-top: 16px;
    }
    .auth-card { width: 100%; max-width: 420px; }
    .auth-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .auth-tab {
        flex: 1;
        padding: 12px 6px;
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.4);
        font-size: 0.88rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .auth-tab.active {
        color: #fff;
        border-bottom: 2px solid var(--color-cyan, #00e5ff);
    }
    .auth-error {
        color: #ff4d4d;
        font-size: 0.85rem;
        margin-bottom: 12px;
        padding: 8px 12px;
        background: rgba(255,77,77,0.1);
        border-radius: 6px;
    }
    .form-row { margin-bottom: 16px; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .card-body { padding: 24px; }
</style>

<script>
    function showTab(tab) {
        ['login','register','guest'].forEach(function(t) {
            document.getElementById('form-' + t).style.display = t === tab ? '' : 'none';
            document.getElementById('tab-' + t).classList.toggle('active', t === tab);
        });
    }

    // Enter key submits whichever tab is active
    document.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        if (document.getElementById('form-login').style.display !== 'none') handleLogin();
        else if (document.getElementById('form-register').style.display !== 'none') handleRegister();
        else if (document.getElementById('form-guest').style.display !== 'none') handleGuest();
    });

    // ── Sign In ──────────────────────────────────────────────
    async function handleLogin() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        const errorEl = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');

        errorEl.style.display = 'none';
        if (!username || !password) {
            errorEl.textContent = 'Please enter your username and password.';
            errorEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        try {
            const data = await SipherAPI.login(username, password);
            if (data.error) {
                errorEl.textContent = data.error;
                errorEl.style.display = 'block';
            } else {
                SipherAPI.saveSession(data.token, data.user);
                window.location.href = './index.html';
            }
        } catch (err) {
            errorEl.textContent = 'Could not connect to server. Please try again.';
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    // ── Create Account ───────────────────────────────────────
    async function handleRegister() {
        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value.trim();
        const errorEl = document.getElementById('register-error');
        const btn = document.getElementById('register-btn');

        errorEl.style.display = 'none';
        if (!username || !email || !password) {
            errorEl.textContent = 'All fields are required.';
            errorEl.style.display = 'block';
            return;
        }
        if (password.length < 6) {
            errorEl.textContent = 'Password must be at least 6 characters.';
            errorEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Creating account...';
        try {
            const data = await SipherAPI.register(username, email, password);
            if (data.error) {
                errorEl.textContent = data.error;
                errorEl.style.display = 'block';
            } else {
                SipherAPI.saveSession(data.token, data.user);
                window.location.href = './index.html';
            }
        } catch (err) {
            errorEl.textContent = 'Could not connect to server. Please try again.';
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    }

    // ── Guest ────────────────────────────────────────────────
    function handleGuest() {
        const name = document.getElementById('guest-name').value.trim();
        const errorEl = document.getElementById('guest-error');

        errorEl.style.display = 'none';
        if (!name) {
            errorEl.textContent = 'Please enter a display name.';
            errorEl.style.display = 'block';
            document.getElementById('guest-name').focus();
            return;
        }
        if (name.length < 2) {
            errorEl.textContent = 'Name must be at least 2 characters.';
            errorEl.style.display = 'block';
            return;
        }

        // Save guest session — no token, isGuest: true
        localStorage.setItem('scipher_user', JSON.stringify({
            username: name,
            isGuest: true,
            trophy_count: 0
        }));
        // No scipher_token set — auth.js allows guests through via isGuest flag

        window.location.href = './index.html';
    }
</script>

</body>
</html>
